# Perfil DAST — usado exclusivamente por el pipeline de seguridad
# Reemplaza PostgreSQL por H2 en memoria para el scan de ZAP
spring.datasource.url=jdbc:h2:mem:dastdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Stubs para servicios externos
resend.api.key=dast-placeholder
resend.from.email=dast@example.com
gemini.api.key=dast-placeholder

# CORS
app.allowed-origins=http://localhost:3000

# Async
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=4
spring.task.execution.pool.queue-capacity=50

# Actuator — solo health para el health check del pipeline
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
