spring.application.name=Sistema_de_Gestion_de_Programas
server.port=${SERVER_PORT}

# DB (desde variables de entorno)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# CORS
app.allowed-origins=http://localhost:3000,https://sistema-de-gestion-de-programas-fro.vercel.app

# JWT
security.jwt.secret=${JWT_SECRET}
# 1d
security.jwt.expiration-ms=86400000
# 7d
security.jwt.refresh-expiration-ms=604800000

server.servlet.session.cookie.secure=true


# Desactivar cachķ para ver cambios al instante en desarrollo
spring.thymeleaf.cache=false
# Definir d¾nde estarßn tus plantillas
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

