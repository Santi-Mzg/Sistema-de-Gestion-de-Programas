# ── Perfil "test" ─────────────────────────────────────────────────────────────
# Activado con @ActiveProfiles("test").
# Sobreescribe las propiedades de application.properties (test resources) para
# asegurar que el perfil de integración siempre use H2 en memoria.

spring.datasource.url=jdbc:h2:mem:testdb-integ;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
