# ── Test environment overrides ────────────────────────────────────────────────
# Replaces every ${...} placeholder from the main application.properties so that
# both @DataJpaTest and @SpringBootTest can load without external env vars.

spring.application.name=Sistema_de_Gestion_de_Programas-test
server.port=8080

# H2 in-memory datasource (replaces PostgreSQL for tests)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Security stubs (beans not loaded in @DataJpaTest; safe for @SpringBootTest)
security.jwt.secret=test-jwt-secret-long-enough-for-hmac-sha-256-algorithm-placeholder
security.jwt.expiration-ms=86400000
security.jwt.refresh-expiration-ms=604800000
server.servlet.session.cookie.secure=false

# Email / API key stubs
resend.api.key=re_test_placeholder_key
resend.from.email=test@example.com
gemini.api.key=test_gemini_placeholder

# CORS
app.allowed-origins=http://localhost:3000

# Async thread pool
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=4
spring.task.execution.pool.queue-capacity=50

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
